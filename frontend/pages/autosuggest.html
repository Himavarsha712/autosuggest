<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Suggest</title>
    <link rel="stylesheet" href="../css/autosuggest.css">
</head>
<body>
    <span class="gear">&#x2699;</span>
    <span class="pill"><span class="green-dot"></span> online | &#x23F0; - ms</span>

    <div class="main-content">
        
        <h1 class="company-name">
           <span class="panda">Panda</span><span class="express">Express</span>
        </h1>
        <p class="tagline">One million phrases. FourAlgorithms. Prefix Based Auto Suggest</p>
   
        <div class="search-bar">
            <span class="lens">&#128269;</span>
            <input class="search-box" type="text"
                placeholder="Start typing to search..." id="search-bar">
        </div>
        <!--  moved outside .search-bar -->
        <div id="search-suggestions"></div>

    </div>
    <!--  script moved to end of body -->
    <script src="../js/autosuggest.js"></script>
</body>
</html>
